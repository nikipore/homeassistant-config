script:
  skip_dimmer_updates:
    alias: Skip Zigbee Dimmer Updates
    mode: single
    variables:
      entities: >
        {{ integration_entities('mqtt') | select('search','^update\..+_dimmer') | select('is_state','on') | list }}
      message: >
        Skipping firmware update of all Zigbee dimmers …
    sequence:
      - condition: template
        value_template: "{{ entities | length > 0 }}"
      - action: update.skip
        target:
          entity_id: "{{ entities }}"
#      - action: notify.persistent_notification
#        data:
#          message: "{{ message }}"
#          title: Zigbee2MQTT

input_button:
  skip_dimmer_updates:
    name: "Skip Zigbee Dimmer Updates"
    icon: mdi:update

automation:
  - alias: Skip Zigbee Dimmer Updates
    triggers:
      - trigger: state
        entity_id: input_button.skip_dimmer_updates
    actions:
      - action: script.skip_dimmer_updates
    id: f615b4e08dc497de692f231873669f5c82906253
  - alias: Skip Zigbee Dimmer Updates on (re)start of Home Assistant (with a delay)
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - delay:
          seconds: 15
      - action: script.skip_dimmer_updates
    id: f9bae70016f342bb10436ffe59f283aa6df2526e
