automation:
  - alias: Export power meter to Google Sheets
    triggers:
      trigger: time_pattern
      minutes: "/15"
    conditions:
      condition: numeric_state
      entity_id: sensor.energy_last_meter_consumption
      above: 0
    actions:
      - action: google_sheets.append_sheet
        data:
          config_entry: d4c1ba49aae5a528a9d94645412bfb32
          worksheet: "Power Meter"
          data:
            time: "{{ utcnow() | as_timestamp | round }}"
            consumption: "{{ states('sensor.energy_last_meter_consumption') | float(0) }}"
            electricity_price: 0.2912
            production: "{{ states('sensor.solartisch_yieldtotal') | float(0) }}"
    id: d698e01895aab3aead886032a61e945c169dd5b6
  - alias: "River 3: Safety Threshold Backup Reserve"
    triggers:
      - trigger: template
        value_template: >
          {{ states('number.river_3_backup_reserve') | float <= states('number.river_3_battery_charge_limit_min') | float }}
    actions:
      - action: number.set_value
        target:
          entity_id: number.river_3_backup_reserve
        data:
          value: >
            {{ states('number.river_3_battery_charge_limit_min') | float + 5 }}
    mode: single
    id: 07f095eec3ab14649f8bb0632b0abef562e1138d

sensor:
  - platform: filter
    name: energy_last_meter_consumption
    entity_id: sensor.tibber_bridge_0100010800ff_in_k
    filters:
      - filter: time_throttle
        window_size: "00:01:00"
        precision: 3
    unique_id: 25996c3b9d7ec9ba80da412ba82a4c615eb2bc7b

template:
  - sensor:
      - default_entity_id: sensor.river_3_net_power
        name: River 3 Net Power
        state_class: measurement
        unit_of_measurement: "W"
        state: >
          {{ states('sensor.river_3_input_power') | float - states('sensor.river_3_output_power') | float }}
        icon: mdi:home-lightning-bolt-outline
        unique_id: d16d0f1bc9089791711093408d78ebb097a48816
